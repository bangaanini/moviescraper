services:
  consumet:
    image: riimuru/consumet-api:latest
    container_name: consumet
    restart: unless-stopped
    env_file:
      - ./ConsumetAPI/.env
    environment:
      PORT: 3000
      NODE_ENV: PROD
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3010:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  ingestor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sflix-ingestor
    depends_on:
      consumet:
        condition: service_healthy
    restart: "no"
    env_file:
      - ./.env
    environment:
      SFLIX_BASE_URL: http://consumet:3000
    profiles:
      - manual

  app-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      APP_API_PORT: 4000
    command: ["node", "dist/app-api/server.js"]
    ports:
      - "127.0.0.1:4010:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
